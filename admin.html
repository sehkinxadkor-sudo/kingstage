<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админка - Корали Сцены</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">КС</span>
        <span class="brand-name">Корали Сцены</span>
      </a>
      <nav class="main-nav" aria-label="Админ меню">
        <a href="index.html#announcements">Анонсы</a>
        <a href="index.html#jobs">Роли</a>
        <a href="#applications">Заявки</a>
        <a href="#tasks">Задачи</a>
      </nav>
      <a class="header-cta" href="index.html">На сайт</a>
    </header>
    <main class="admin-main" data-admin></main>
    <script src="vault.js?v=1.1"></script>
    <script src="script.js"></script>
    <script>
        const CONFIG = {
            saveUrl: '/api/save',
            file: 'api/content.json'
        };

        // 1. Функция бэкапа данных из браузера на GitHub
        async function backupToGitHub() {
            try {
                // Забираем текущее состояние твоей админки из браузера
                const data = {
                    published: JSON.parse(localStorage.getItem('korali-published-v1') || '{}'),
                    vault: JSON.parse(localStorage.getItem('korali-vault-v1') || '{}')
                };

                // Отправляем пакет на сервер Vercel -> GitHub
                const response = await fetch(CONFIG.saveUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: CONFIG.file,
                        content: JSON.stringify(data, null, 2),
                        commitMessage: 'Синхронизация данных админ-панели'
                    })
                });

                const result = await response.json();
                if (result.success) {
                    console.log('GitHub успешно синхронизирован!');
                } else {
                    console.error('Ошибка сохранения на GitHub:', result.error);
                }
            } catch (err) {
                console.error('Ошибка сети при бэкапе:', err);
            }
        }

        // 2. Функция скачивания данных из GitHub в браузер при входе
        async function loadFromGitHub() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/sehkinxadkor-sudo/kingstage/main/${CONFIG.file}?t=${Date.now()}`);
                if (res.ok) {
                    const cloud = await res.json();
                    
                    // Переносим данные в localStorage
                    if (cloud.published) localStorage.setItem('korali-published-v1', JSON.stringify(cloud.published));
                    if (cloud.vault) localStorage.setItem('korali-vault-v1', JSON.stringify(cloud.vault));
                    
                    // Просим твой script.js полностью обновить карточки на экране
                    if (typeof renderAdmin === 'function') {
                        renderAdmin();
                    }
                }
            } catch (e) {
                console.log('Файл контента на GitHub еще не создан.');
            }
        }

        // 3. Автоматическое отслеживание действий в админке
        window.addEventListener('DOMContentLoaded', () => {
            // Как только открыли страницу — сразу качаем актуальную базу с GitHub
            loadFromGitHub();

            // Следим за отправкой любых форм в админке (роли, анонсы)
            document.addEventListener('submit', () => {
                // Ждем 300 миллисекунд, чтобы твой script.js успел обработать форму и сохранить в базу
                setTimeout(backupToGitHub, 300);
            });
            
            // Следим за нажатиями на кнопки (Удалить, Принять, Отклонить)
            document.addEventListener('click', (e) => {
                const target = e.target;
                if (
                    target.closest('button') || 
                    target.hasAttribute('data-announcement-delete') || 
                    target.closest('[data-announcement-delete]')
                ) {
                    // Ждем, пока script.js удалит элемент, и обновляем GitHub
                    setTimeout(backupToGitHub, 300);
                }
            });
        });
    </script>
  </body>
</html>
