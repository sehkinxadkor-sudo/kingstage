<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админка - Корали Сцены</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">КС</span>
        <span class="brand-name">Корали Сцены</span>
      </a>
      <nav class="main-nav" aria-label="Админ меню">
        <a href="index.html#announcements">Анонсы</a>
        <a href="index.html#jobs">Роли</a>
        <a href="#applications">Заявки</a>
        <a href="#tasks">Задачи</a>
      </nav>
      <a class="header-cta" href="index.html">На сайт</a>
    </header>
    <main class="admin-main" data-admin></main>
    <script src="vault.js"></script>
    <script src="script.js"></script>
  </body>
</html>

    <script>
        const CONFIG = {
            saveUrl: '/api/save',
            files: {
                applications: 'api/applications.json',
                jobs: 'api/jobs.json',
                announcements: 'api/announcements.json'
            }
        };

        let store = { applications: [], jobs: [], announcements: [] };

        function switchTab(tabName) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.main-nav .nav-link').forEach(l => l.classList.remove('active'));
            
            const targetSection = document.getElementById(`tab-${tabName}`);
            if (targetSection) targetSection.style.display = 'block';
            
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        async function loadData() {
            for (const [key, path] of Object.entries(CONFIG.files)) {
                try {
                    const res = await fetch(`https://raw.githubusercontent.com/sehkinxadkor-sudo/kingstage/main/${path}?t=${Date.now()}`);
                    if (res.ok) {
                        store[key] = await res.json();
                    }
                } catch (e) {
                    console.log(`Файл ${path} пуст или создается.`);
                }
            }
            renderAll();
        }

        async function gitPush(filename, data, message) {
            try {
                const response = await fetch(CONFIG.saveUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: filename,
                        content: JSON.stringify(data, null, 2),
                        commitMessage: message
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert('Успешно обновлено на сервере!');
                    loadData();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (err) {
                alert('Ошибка сети с сервером Vercel.');
            }
        }

        function renderAll() {
            // Отображение списка заявок с кнопкой удаления
            const appList = document.getElementById('applications-list');
            if (store.applications.length === 0) {
                appList.innerHTML = '<p class="empty-info">Новых заявок пока нет.</p>';
            } else {
                appList.innerHTML = store.applications.map((app, index) => `
                    <div class="data-card">
                        <h4>Заявка №${index + 1}</h4>
                        <p><strong>Имя:</strong> ${app.name}</p>
                        <p><strong>Контакты:</strong> ${app.contacts}</p>
                        <p><strong>Роль:</strong> ${app.role}</p>
                        <p><strong>О себе:</strong> ${app.about}</p>
                        <button onclick="deleteItem('applications', ${index}, 'Удаление заявки')" class="btn-delete">Удалить</button>
                    </div>
                `).join('');
            }

            // Роли
            const jList = document.getElementById('jobs-list');
            if (store.jobs.length === 0) {
                jList.innerHTML = '<p class="empty-info">Список ролей пуст.</p>';
            } else {
                jList.innerHTML = store.jobs.map((job, index) => `
                    <div class="data-card">
                        <h4>${job.title}</h4>
                        <p>${job.description}</p>
                        <button onclick="deleteItem('jobs', ${index}, 'Удаление роли')" class="btn-delete">Удалить</button>
                    </div>
                `).join('');
            }

            // Анонсы
            const aList = document.getElementById('announcements-list');
            if (store.announcements.length === 0) {
                aList.innerHTML = '<p class="empty-info">Анонсов нет.</p>';
            } else {
                aList.innerHTML = store.announcements.map((ann, index) => `
                    <div class="data-card">
                        <h4>${ann.title} (${ann.date})</h4>
                        <p>${ann.text}</p>
                        <button onclick="deleteItem('announcements', ${index}, 'Удаление анонса')" class="btn-delete">Удалить</button>
                    </div>
                `).join('');
            }
        }

        function saveJob(e) {
            e.preventDefault();
            const title = document.getElementById('job-title').value;
            const description = document.getElementById('job-desc').value;
            store.jobs.push({ title, description });
            gitPush(CONFIG.files.jobs, store.jobs, `Добавлена роль: ${title}`);
            e.target.reset();
        }

        function saveAnnouncement(e) {
            e.preventDefault();
            const title = document.getElementById('ann-title').value;
            const date = document.getElementById('ann-date').value;
            const text = document.getElementById('ann-text').value;
            store.announcements.push({ title, date, text });
            gitPush(CONFIG.files.announcements, store.announcements, `Добавлен анонс: ${title}`);
            e.target.reset();
        }

        function deleteItem(type, index, msg) {
            if (confirm('Вы уверены, что хотите удалить этот элемент?')) {
                store[type].splice(index, 1);
                gitPush(CONFIG.files[type], store[type], `${msg} #${index + 1}`);
            }
        }

        window.onload = loadData;
    </script>
  </body>
</html>
