<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админка - Корали Сцены</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">КС</span>
        <span class="brand-name">Корали Сцены</span>
      </a>
      <nav class="main-nav" aria-label="Админ меню">
        <a href="index.html#announcements">Анонсы</a>
        <a href="index.html#jobs">Роли</a>
        <a href="#applications">Заявки</a>
        <a href="#tasks">Задачи</a>
      </nav>
      <a class="header-cta" href="index.html">На сайт</a>
    </header>
    <main class="admin-main" data-admin></main>
    <script src="vault.js?v=1.1"></script>
    <script src="script.js"></script>
    <script>
        const CONFIG = {
            saveUrl: '/api/save',
            file: 'api/content.json'
        };

        // 1. Функция бэкапа публичных данных на GitHub
        async function backupToGitHub() {
            try {
                // Берём только публичные данные (роли и анонсы), которые видит главная страница
                const publishedData = JSON.parse(localStorage.getItem('korali-published-v1') || '{}');

                // Проверяем, что данные не пустые, чтобы случайно не стереть GitHub
                if (!publishedData.roles && !publishedData.announcements) {
                    return;
                }

                // Отправляем чистый контент на сервер Vercel -> GitHub
                const response = await fetch(CONFIG.saveUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: CONFIG.file,
                        content: JSON.stringify(publishedData, null, 2),
                        commitMessage: 'Обновление контента сайта через админ-панель'
                    })
                });

                const result = await response.json();
                if (result.success) {
                    console.log('GitHub успешно синхронизирован!');
                } else {
                    console.error('Ошибка сохранения на GitHub:', result.error);
                }
            } catch (err) {
                console.error('Ошибка сети при бэкапе:', err);
            }
        }

        // 2. Функция загрузки данных из GitHub при входе в админку
        async function loadFromGitHub() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/sehkinxadkor-sudo/kingstage/main/${CONFIG.file}?t=${Date.now()}`);
                if (res.ok) {
                    const cloudData = await res.json();
                    
                    // Записываем полученные роли и анонсы в публичное хранилище браузера
                    localStorage.setItem('korali-published-v1', JSON.stringify(cloudData));
                    
                    // Заставляем систему перерисовать карточки на экране
                    if (typeof renderAdmin === 'function') {
                        renderAdmin();
                    }
                }
            } catch (e) {
                console.log('Файл контента на GitHub еще не создан.');
            }
        }

        // 3. Автоматическое отслеживание действий администратора
        window.addEventListener('DOMContentLoaded', () => {
            // Как только открыли админку — забираем данные из репозитория
            loadFromGitHub();

            // Следим за добавлением новых анонсов и ролей через формы
            document.addEventListener('submit', () => {
                setTimeout(backupToGitHub, 400);
            });
            
            // Следим за удалением элементов (кнопки удаления анонсов или ролей)
            document.addEventListener('click', (e) => {
                const target = e.target;
                if (
                    target.closest('button') || 
                    target.hasAttribute('data-announcement-delete') || 
                    target.closest('[data-announcement-delete]')
                ) {
                    setTimeout(backupToGitHub, 400);
                }
            });
        });
    </script>
  </body>
</html>
